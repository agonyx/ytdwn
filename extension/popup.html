<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>YTDWN</title>
</head>
<body>
  <div class="popup">
    <div class="header">
      <h1>YTDWN</h1>
      <span class="version">v1.0.0</span>
    </div>

    <div id="status-bar" class="status-bar" data-status="unknown">
      <span class="status-dot"></span>
      <span class="status-text">Checking server...</span>
    </div>

    <div id="loading-section" class="section" style="display:none;">
      <div class="loading-state">
        <span class="spinner"></span>
        <p>Fetching video info...</p>
      </div>
    </div>

    <div id="error-section" class="section" style="display:none;">
      <div class="error-msg" id="error-msg"></div>
    </div>

    <div id="video-section" class="section" style="display:none;">
      <div class="video-card">
        <img id="video-thumb" class="video-thumb" src="" alt="">
        <div class="video-meta">
          <p id="video-title" class="video-title"></p>
          <span id="video-duration" class="video-duration"></span>
        </div>
      </div>

      <div id="analysis-section" class="analysis-section" style="display:none;">
        <button id="analyze-btn" class="analyze-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
          Analyze BPM & Key
        </button>
      </div>

      <div class="mode-toggle">
        <button id="mode-video" class="mode-btn active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <polygon points="10,9 16,12 10,15" fill="currentColor" stroke="none"/>
          </svg>
          Video
        </button>
        <button id="mode-audio" class="mode-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
          Audio
        </button>
      </div>

      <div id="smart-download" class="smart-download" style="display:none;">
        <button id="smart-btn" class="smart-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span id="smart-btn-label">Download Video</span>
          <span id="smart-btn-size" class="smart-btn-size"></span>
        </button>

        <div id="smart-progress-bar" class="smart-progress-bar" style="display:none;">
          <div id="smart-progress-fill" class="smart-progress-fill" style="width:0%"></div>
        </div>
      </div>

      <button id="toggle-options" class="toggle-options" style="display:none;">
        <span id="toggle-label">More options...</span>
        <svg id="toggle-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="chevron">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      <div id="formats-list" class="formats-list" style="display:none;"></div>
    </div>

    <div id="no-youtube" class="section" style="display:none;">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p>Navigate to a YouTube video to download</p>
      </div>
    </div>

    <div class="footer">
      <span class="footer-url">ytdwn.vanity.pw</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
